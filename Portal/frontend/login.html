<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | IMS Portal</title>
  <link rel="icon" type="image/png" href="assets/ims-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=official-email-1">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-brand">
        <img src="assets/ims-icon.png" alt="IMS">
        <div>
          <span>IMS Portal</span>
          <h1>Login</h1>
        </div>
      </div>

      <form class="auth-form" id="emailLoginForm">
        <p id="errorMsg" style="color:red; font-size:13px; display:none;"></p>
        <p id="successMsg" style="color:green; font-size:13px; display:none;"></p>
        <label>Email Address<input id="loginEmail" type="email" autocomplete="email" required></label>
        <label>Password
          <span class="auth-password-field">
            <input id="loginPassword" type="password" autocomplete="current-password" required>
            <button class="auth-password-toggle" type="button" data-password-toggle="loginPassword" aria-label="Show password"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
          </span>
        </label>
        <button class="auth-link-btn" id="forgotPasswordBtn" type="button">Forgot password?</button>
        <button class="primary auth-submit" type="submit">Login</button>
        <button class="secondary auth-google" id="googleLoginBtn" type="button">Sign in with Google</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
      <p class="auth-legal-links"><a href="privacy-policy.html">Privacy Policy</a><span>·</span><a href="terms-and-conditions.html">Terms &amp; Conditions</a></p>
    </section>
  </main>

  <script src="js/firebase-config.js?v=firebase-1"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app-check.js";
    import { browserLocalPersistence, getAuth, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, reload, sendEmailVerification, sendPasswordResetEmail, setPersistence, signInWithEmailAndPassword, signInWithPopup, signInWithRedirect, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const firebaseConfig = await window.imsFirebaseConfigReady.catch((error) => {
      const errorMsg = document.getElementById("errorMsg");
      errorMsg.textContent = error.message || "Unable to load login configuration.";
      errorMsg.style.display = "block";
      document.querySelectorAll("#emailLoginForm input, #emailLoginForm button, .auth-google").forEach((element) => {
        element.disabled = true;
      });
      return null;
    });
    if (!firebaseConfig) {
      throw new Error("IMS Firebase configuration is unavailable.");
    }
    const app = initializeApp(firebaseConfig);
    if (firebaseConfig.appCheckRecaptchaSiteKey) {
      initializeAppCheck(app, {
        provider: new ReCaptchaV3Provider(firebaseConfig.appCheckRecaptchaSiteKey),
        isTokenAutoRefreshEnabled: true
      });
    }
    const auth = getAuth(app);
    await setPersistence(auth, browserLocalPersistence);
    const googleProvider = new GoogleAuthProvider();
    const OFFICIAL_EMAIL_MESSAGE = 'Only Shehersaaz official email addresses are allowed.';
    const SUPER_ADMIN_EMAIL = 'superadmin059@gmail.com';
    const portalHomeUrl = window.location.protocol === 'file:' ? 'http://localhost:3000/index.html' : 'index.html';
    const loginPageUrl = window.location.protocol === 'file:' ? 'http://localhost:3000/login.html' : `${window.location.origin}${window.location.pathname}`;
    const params = new URLSearchParams(window.location.search);
    const requestedReturnTo = params.get('returnTo') || portalHomeUrl;
    const returnTo = /(^|\/)(login|signup)\.html/i.test(requestedReturnTo) ? portalHomeUrl : requestedReturnTo;
    let hasRedirected = false;

    const pendingAuthError = sessionStorage.getItem('imsAuthError');
    if (pendingAuthError) {
      sessionStorage.removeItem('imsAuthError');
      showError(pendingAuthError);
    }

    function goToPortal() {
      if (hasRedirected) return;
      hasRedirected = true;
      window.location.replace(returnTo);
    }

    function isOfficialEmail(email) {
      const cleanEmail = String(email || '').trim().toLowerCase();
      return cleanEmail === SUPER_ADMIN_EMAIL || cleanEmail.endsWith('@shehersaaz.org.pk');
    }

    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      successMsg.style.display = 'none';
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
    }

    function showSuccess(message) {
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.style.display = 'none';
      successMsg.textContent = message;
      successMsg.style.display = 'block';
    }

    async function completeLogin(user, { resendVerification = false } = {}) {
      if (await rejectUnauthorizedUser(user)) return;
      if (!(await requireVerifiedEmail(user, { resend: resendVerification }))) return;
      localStorage.setItem('firebase_token', await user.getIdToken());
      goToPortal();
    }

    const eyeIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
    const eyeOffIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 3 18 18"></path><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path><path d="M9.36 5.37A9.9 9.9 0 0 1 12 5c6.5 0 10 7 10 7a17.6 17.6 0 0 1-3.06 4.19"></path><path d="M6.23 6.23A17.3 17.3 0 0 0 2 12s3.5 7 10 7a9.9 9.9 0 0 0 5.27-1.5"></path></svg>';

    function setPasswordToggleIcon(button, isHidden) {
      button.innerHTML = isHidden ? eyeIcon : eyeOffIcon;
      button.setAttribute('aria-label', isHidden ? 'Show password' : 'Hide password');
    }

    document.querySelectorAll('[data-password-toggle]').forEach((button) => {
      setPasswordToggleIcon(button, true);
      button.addEventListener('click', () => {
        const input = document.getElementById(button.dataset.passwordToggle);
        if (!input) return;
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        setPasswordToggleIcon(button, !isHidden);
      });
    });

    async function rejectUnauthorizedUser(user) {
      if (isOfficialEmail(user?.email)) return false;
      localStorage.removeItem('firebase_token');
      await signOut(auth);
      showError(OFFICIAL_EMAIL_MESSAGE);
      return true;
    }

    async function requireVerifiedEmail(user, { resend = false } = {}) {
      if (!user) return false;
      await reload(user);
      if (user.emailVerified) return true;
      localStorage.removeItem('firebase_token');
      if (resend) {
        try {
          await sendEmailVerification(user, { url: loginPageUrl });
          showSuccess('Verify your email before entering the portal. A verification link has been sent to your inbox.');
        } catch (error) {
          showError(error.message || 'Verify your email before entering the portal.');
        }
      } else {
        showError('Verify your email before entering the portal.');
      }
      await signOut(auth);
      return false;
    }

    async function handleGoogleLogin() {
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      try {
        const { user } = await signInWithPopup(auth, googleProvider);
        await completeLogin(user);
      } catch (error) {
        if (error?.code === 'auth/popup-closed-by-user' || error?.code === 'auth/cancelled-popup-request') {
          showSuccess('Continuing Google sign-in...');
          await signInWithRedirect(auth, googleProvider);
          return;
        }
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
      }
    }

    document.getElementById('googleLoginBtn')?.addEventListener('click', handleGoogleLogin);

    try {
      const redirectResult = await getRedirectResult(auth);
      if (redirectResult?.user) {
        await completeLogin(redirectResult.user);
      }
    } catch (error) {
      showError(error.message || 'Unable to complete Google sign-in.');
    }

    if (!hasRedirected) {
      const initialUser = await new Promise((resolve) => {
        const unsubscribe = onAuthStateChanged(auth, (user) => {
          unsubscribe();
          resolve(user);
        });
      });
      if (initialUser) {
        localStorage.removeItem('firebase_token');
        await signOut(auth);
      }
    }

    document.getElementById('emailLoginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      try {
        const { user } = await signInWithEmailAndPassword(auth, email, password);
        await completeLogin(user, { resendVerification: true });
      } catch (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = 'block';
      }
    });

    document.getElementById('forgotPasswordBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) {
        showError('Enter your email address first.');
        document.getElementById('loginEmail').focus();
        return;
      }
      if (!isOfficialEmail(email)) {
        showError(OFFICIAL_EMAIL_MESSAGE);
        return;
      }
      try {
        await sendPasswordResetEmail(auth, email, { url: loginPageUrl });
        showSuccess('Password reset link sent. Please check your email.');
      } catch (error) {
        showError(error.message || 'Unable to send password reset email.');
      }
    });
  </script>
</body>
</html>
