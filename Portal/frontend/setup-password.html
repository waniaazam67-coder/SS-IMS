<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password | IMS Portal</title>
  <link rel="icon" type="image/png" href="assets/ims-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=invite-1">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-brand">
        <img src="assets/ims-icon.png" alt="IMS">
        <div>
          <span>IMS Portal</span>
          <h1>Set Password</h1>
        </div>
      </div>

      <form class="auth-form" id="setupPasswordForm">
        <p id="errorMsg" style="color:red; font-size:13px; display:none;"></p>
        <p id="successMsg" style="color:green; font-size:13px; display:none;"></p>
        <label>Email Address<input id="setupEmail" type="email" autocomplete="email" readonly></label>
        <label>New Password<input id="newPassword" type="password" autocomplete="new-password" minlength="8" required></label>
        <label>Confirm Password<input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required></label>
        <button class="primary auth-submit" type="submit">Set password and continue</button>
      </form>

      <p class="auth-switch">Already set your password? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="js/firebase-config.js?v=firebase-1"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { confirmPasswordReset, getAuth, signInWithEmailAndPassword, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const app = initializeApp(window.IMS_FIREBASE_CONFIG);
    const auth = getAuth(app);
    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get('oobCode');
    const emailHint = params.get('email') || '';
    const returnTo = params.get('continueUrl') || 'index.html';
    const OFFICIAL_EMAIL_MESSAGE = 'Only Shehersaaz official email addresses are allowed.';

    function isOfficialEmail(email) {
      return String(email || '').trim().toLowerCase().endsWith('@shehersaaz.org.pk');
    }

    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      successMsg.style.display = 'none';
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
    }

    function showSuccess(message) {
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.style.display = 'none';
      successMsg.textContent = message;
      successMsg.style.display = 'block';
    }

    async function loadInvite() {
      if (!oobCode) {
        showError('This setup link is missing its verification code.');
        document.getElementById('setupPasswordForm').querySelector('button').disabled = true;
        return;
      }
      try {
        const email = await verifyPasswordResetCode(auth, oobCode);
        if (!isOfficialEmail(email)) {
          showError(OFFICIAL_EMAIL_MESSAGE);
          document.getElementById('setupPasswordForm').querySelector('button').disabled = true;
          return;
        }
        document.getElementById('setupEmail').value = email || emailHint;
      } catch (error) {
        showError('This setup link is invalid or expired. Please ask an admin for a new link.');
        document.getElementById('setupPasswordForm').querySelector('button').disabled = true;
      }
    }

    document.getElementById('setupPasswordForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('setupEmail').value.trim();
      const password = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }
      try {
        await confirmPasswordReset(auth, oobCode, password);
        const { user } = await signInWithEmailAndPassword(auth, email, password);
        localStorage.setItem('firebase_token', await user.getIdToken());
        showSuccess('Password created. Opening IMS Portal...');
        window.location.replace(returnTo);
      } catch (error) {
        showError(error.message || 'Unable to set password.');
      }
    });

    loadInvite();
  </script>
</body>
</html>
