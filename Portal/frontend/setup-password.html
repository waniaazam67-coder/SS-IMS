<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password | IMS Portal</title>
  <link rel="icon" type="image/png" href="assets/ims-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=invite-1">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-brand">
        <img src="assets/ims-icon.png" alt="IMS">
        <div>
          <span>IMS Portal</span>
          <h1>Set Password</h1>
        </div>
      </div>

      <form class="auth-form" id="setupPasswordForm">
        <p id="errorMsg" style="color:red; font-size:13px; display:none;"></p>
        <p id="successMsg" style="color:green; font-size:13px; display:none;"></p>
        <label>Email Address<input id="setupEmail" type="email" autocomplete="email" readonly></label>
        <label>New Password
          <span class="auth-password-field">
            <input id="newPassword" type="password" autocomplete="new-password" minlength="8" required>
            <button class="auth-password-toggle" type="button" data-password-toggle="newPassword" aria-label="Show password"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
          </span>
        </label>
        <label>Confirm Password
          <span class="auth-password-field">
            <input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required>
            <button class="auth-password-toggle" type="button" data-password-toggle="confirmPassword" aria-label="Show password"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
          </span>
        </label>
        <button class="primary auth-submit" type="submit">Set password and continue</button>
      </form>

      <p class="auth-switch">Already set your password? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="js/firebase-config.js?v=firebase-1"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { browserLocalPersistence, confirmPasswordReset, getAuth, setPersistence, signInWithCustomToken, signInWithEmailAndPassword, updatePassword, verifyPasswordResetCode } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const app = initializeApp(window.IMS_FIREBASE_CONFIG);
    const auth = getAuth(app);
    await setPersistence(auth, browserLocalPersistence);
    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get('oobCode');
    const inviteToken = params.get('inviteToken');
    const emailHint = params.get('email') || '';
    const portalHomeUrl = window.location.protocol === 'file:' ? 'http://localhost:3000/index.html' : 'index.html';
    const requestedReturnTo = params.get('continueUrl') || portalHomeUrl;
    const returnTo = /setup-password\.html/i.test(requestedReturnTo) ? portalHomeUrl : requestedReturnTo;
    const OFFICIAL_EMAIL_MESSAGE = 'Only Shehersaaz official email addresses are allowed.';

    function isOfficialEmail(email) {
      return String(email || '').trim().toLowerCase().endsWith('@shehersaaz.org.pk');
    }

    function showError(message) {
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      successMsg.style.display = 'none';
      errorMsg.textContent = message;
      errorMsg.style.display = 'block';
    }

    function showSuccess(message) {
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.style.display = 'none';
      successMsg.textContent = message;
      successMsg.style.display = 'block';
    }

    const eyeIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
    const eyeOffIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 3 18 18"></path><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path><path d="M9.36 5.37A9.9 9.9 0 0 1 12 5c6.5 0 10 7 10 7a17.6 17.6 0 0 1-3.06 4.19"></path><path d="M6.23 6.23A17.3 17.3 0 0 0 2 12s3.5 7 10 7a9.9 9.9 0 0 0 5.27-1.5"></path></svg>';

    function setPasswordToggleIcon(button, isHidden) {
      button.innerHTML = isHidden ? eyeIcon : eyeOffIcon;
      button.setAttribute('aria-label', isHidden ? 'Show password' : 'Hide password');
    }

    document.querySelectorAll('[data-password-toggle]').forEach((button) => {
      setPasswordToggleIcon(button, true);
      button.addEventListener('click', () => {
        const input = document.getElementById(button.dataset.passwordToggle);
        if (!input) return;
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        setPasswordToggleIcon(button, !isHidden);
      });
    });

    async function loadInvite() {
      if (inviteToken) {
        if (!isOfficialEmail(emailHint)) {
          showError(OFFICIAL_EMAIL_MESSAGE);
          document.getElementById('setupPasswordForm').querySelector('button').disabled = true;
          return;
        }
        document.getElementById('setupEmail').value = emailHint;
        return;
      }
      if (!oobCode) {
        showError('This setup link is missing its verification code.');
        document.getElementById('setupPasswordForm').querySelector('button').disabled = true;
        return;
      }
      try {
        const email = await verifyPasswordResetCode(auth, oobCode);
        if (!isOfficialEmail(email)) {
          showError(OFFICIAL_EMAIL_MESSAGE);
          document.getElementById('setupPasswordForm').querySelector('button').disabled = true;
          return;
        }
        document.getElementById('setupEmail').value = email || emailHint;
      } catch (error) {
        showError('This setup link is invalid or expired. Please ask an admin for a new link.');
        document.getElementById('setupPasswordForm').querySelector('button').disabled = true;
      }
    }

    document.getElementById('setupPasswordForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('setupEmail').value.trim();
      const password = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }
      try {
        let signedInUser = null;
        if (inviteToken) {
          const credential = await signInWithCustomToken(auth, inviteToken);
          signedInUser = credential.user;
          if (!isOfficialEmail(signedInUser?.email || email)) {
            throw new Error(OFFICIAL_EMAIL_MESSAGE);
          }
          await updatePassword(signedInUser, password);
        } else {
          await confirmPasswordReset(auth, oobCode, password);
          const credential = await signInWithEmailAndPassword(auth, email, password);
          signedInUser = credential.user;
        }
        localStorage.setItem('firebase_token', await signedInUser.getIdToken(true));
        showSuccess('Password created. Opening IMS Portal...');
        window.location.replace(returnTo);
      } catch (error) {
        showError(error.message || 'Unable to set password.');
      }
    });

    loadInvite();
  </script>
</body>
</html>
